name: SSH + Tailscale Setup

on:
  workflow_dispatch:  # 手动触发工作流

jobs:
  setup-ssh-tailscale:
    runs-on: ubuntu-latest
    permissions:
      contents: read  # 基础权限

    steps:
      - name: 安装必要依赖
        run: |
          sudo apt update && sudo apt install -y openssh-server openssh-client

      - name: 配置 SSH 服务（启用 root 登录和 ed25519 验证）
        run: |
          # 创建 SSH 目录并设置权限
          sudo mkdir -p /root/.ssh
          sudo chmod 700 /root/.ssh
          
          # 将私钥写入 authorized_keys
          echo "${{ secrets.SSH_PRIVATE_KEY }}" | sudo tee /root/.ssh/authorized_keys > /dev/null
          sudo chmod 600 /root/.ssh/authorized_keys
          sudo chown root:root /root/.ssh/authorized_keys
          
          # 修改 SSH 配置
          sudo sed -i 's/^#PermitRootLogin.*/PermitRootLogin yes/' /etc/ssh/sshd_config
          sudo sed -i 's/^#PasswordAuthentication.*/PasswordAuthentication no/' /etc/ssh/sshd_config
          sudo sed -i 's/^#PubkeyAuthentication.*/PubkeyAuthentication yes/' /etc/ssh/sshd_config
          sudo sed -i 's/^#HostKey .*ed25519.*$/HostKey \/etc\/ssh\/ssh_host_ed25519_key/' /etc/ssh/sshd_config
          
          # 重启 SSH 服务
          sudo service ssh restart

      - name: 安装并启动 Tailscale
        run: |
          # 安装 Tailscale
          curl -fsSL https://tailscale.com/install.sh | sh
          # 使用 auth-key 启动 Tailscale
          sudo tailscale up --auth-key=${{ secrets.TAILSCALE_AUTH_KEY }}

      - name: 保持 GitHub Actions 运行（防止退出）
        run: |
          # 无限循环保持进程运行
          while true; do sleep 3600; done
