name: SSH + Tailscale Runner

on:
  workflow_dispatch:  # 手动触发工作流

jobs:
  setup-ssh-tailscale:
    runs-on: ubuntu-latest
    steps:
      - name: 配置系统环境，开启 SSH 服务
        run: |
          # 更新系统并安装必要工具
          sudo apt update && sudo apt install -y openssh-server

          # 配置 SSH 允许 root 登录和密钥认证
          sudo sed -i 's/^#PermitRootLogin.*/PermitRootLogin yes/' /etc/ssh/sshd_config
          sudo sed -i 's/^#PasswordAuthentication.*/PasswordAuthentication no/' /etc/ssh/sshd_config
          sudo sed -i 's/^#PubkeyAuthentication.*/PubkeyAuthentication yes/' /etc/ssh/sshd_config

          # 创建 root 用户的 .ssh 目录并配置公钥
          sudo mkdir -p /root/.ssh
          sudo echo "${{ secrets.SSH_PUBLIC_KEY }}" > /root/.ssh/authorized_keys
          sudo chmod 700 /root/.ssh
          sudo chmod 600 /root/.ssh/authorized_keys
          sudo chown -R root:root /root/.ssh

          # 重启 SSH 服务使配置生效
          sudo service ssh restart

      - name: 安装并启动 Tailscale
        run: |
          # 安装 Tailscale
          curl -fsSL https://tailscale.com/install.sh | sh
          # 使用密钥启动 Tailscale
          sudo tailscale up --auth-key=${{ secrets.TAILSCALE_AUTH_KEY }}
          # 输出 Tailscale IP 方便连接
          echo "Tailscale IP: $(tailscale ip -4)"

      - name: 保持 GitHub Actions 任务不终止
        run: |
          # 无限循环保持进程运行
          while true; do sleep 3600; done
